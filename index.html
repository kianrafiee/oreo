<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconify Store</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --border: #2a2e38;
    --text: #e8eaed;
    --muted: #9aa0aa;
    --accent: #6c8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 24px;
  }
  header { max-width: 1000px; margin: 0 auto 40px; text-align: center; }
  header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
  header p { color: var(--muted); margin-top: 8px; }
  .grid {
    max-width: 1000px; margin: 0 auto; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px 20px; text-align: center;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--accent); }
  .icon-wrap {
    background: var(--bg); border-radius: 12px; height: 120px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
  }
  .icon-wrap svg { width: 56px; height: 56px; color: var(--accent); }
  .name { font-weight: 600; font-size: 1.05rem; }
  .price { color: var(--muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
  .buy {
    margin-top: 14px; width: 100%; padding: 9px 0; border: none;
    border-radius: 8px; background: var(--accent); color: #fff;
    font-weight: 600; cursor: pointer; font-size: 0.9rem;
  }
  .buy:hover { opacity: 0.9; }
</style>
</head>
<body>
  <header>
    <h1>Iconify Store</h1>
    <p>Five fine products, sourced straight from the icon set</p>
  </header>
